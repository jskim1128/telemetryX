# Postgres credentials. CHANGE THESE before deploying to production.
# To generate base64:  echo -n 'mypassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: sdsmcv-prd
type: Opaque
stringData:
