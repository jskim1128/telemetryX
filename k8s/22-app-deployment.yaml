# Stateless Next.js app behind a Service.
# Migrations run via the container entrypoint on each pod start
# (prisma migrate deploy is idempotent).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetryx-app
  namespace: sdsmcv-prd
  labels:
    app: telemetryx-app
    e2-project: e2-telemetry
    e2-environment: PRD
    e2-criticality: "2"
    e2-support-contact: Jo.Shin.Kim
    e2-owner: Jo.Shin.Kim
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: telemetryx-app
  template:
    metadata:
      labels:
        app: telemetryx-app
        e2-project: e2-telemetry
        e2-environment: PRD
        e2-criticality: "2"
        e2-support-contact: Jo.Shin.Kim
        e2-owner: Jo.Shin.Kim
    spec:
      containers:
        - name: telemetryx-app
          image: artifactory.sandisk.com:6629/telemetryx/app:latest
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 300m
              memory: 1Gi
          ports:
            - containerPort: 3000
              name: telemetryx-app
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
      imagePullSecrets:
        - name: cv-artifactory-secret
