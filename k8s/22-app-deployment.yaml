# Stateless Next.js app. Two replicas behind a Service.
# Migrations run via the container entrypoint on each pod start
# (prisma migrate deploy is idempotent).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feat-tracking-app
  namespace: feat-tracking
  labels:
    app.kubernetes.io/name: feat-tracking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: feat-tracking-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feat-tracking-app
    spec:
      containers:
        - name: app
          # Replace with your image: e.g. ghcr.io/<you>/feat-tracking:<tag>
          image: feat-tracking:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
