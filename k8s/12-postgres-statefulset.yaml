# Postgres StatefulSet ‚Äî the persistence layer.
#
# `volumeClaimTemplates` requests a PersistentVolumeClaim that the cluster's
# default StorageClass provisions into a PersistentVolume. That PV is
# re-attached to the pod across restarts, image upgrades, and redeploys, so
# tracking data survives every deployment.
#
# To use a specific storage class, set `storageClassName` below (e.g. "gp3",
# "standard", "fast-ssd"). If left out, the cluster default is used.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: feat-tracking
  labels:
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            # Avoid Postgres trying to chown the lost+found dir of some PVs.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName: standard   # uncomment to pin a specific class
        resources:
          requests:
            storage: 10Gi
