# DATABASE_URL for the Next.js app to reach the external PostgreSQL host.
# Format: postgres://<user>:<pass>@<host>:<port>/<db>?schema=public
#
# The database is hosted on a dedicated VM (10.91.26.224); the previous
# in-cluster Postgres (StatefulSet/Service/Secret in k8s/10-/11-/12-*.yaml)
# has been retired. Lifecycle and persistence of the DB are managed on
# that host, not by Kubernetes.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: sdsmcv-prd
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:sandisk-telemetryx@10.91.26.224:5432/postgres?schema=public"
