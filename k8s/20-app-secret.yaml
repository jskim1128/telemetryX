# DATABASE_URL for the Next.js app to reach Postgres in-cluster.
# Format: postgres://<user>:<pass>@<svc>:<port>/<db>?schema=public
# The host "postgres" is the headless Service from 11-postgres-service.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: sdsmcv-prd
type: Opaque
stringData:
  DATABASE_URL: "postgres://feat:featpass-change-me@postgres:5432/feattracking?schema=public"
