# Optional Ingress for external access. Replace the host and configure TLS
# as needed for your environment. Requires an Ingress controller (e.g.
# ingress-nginx, traefik) and optionally cert-manager for TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: feat-tracking
  namespace: feat-tracking
  annotations:
    # ingress-nginx defaults — adjust to your controller
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: feat-tracking.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: feat-tracking-app
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - feat-tracking.local
  #     secretName: feat-tracking-tls
